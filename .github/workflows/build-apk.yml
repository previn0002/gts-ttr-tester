name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Add generateStaticParams to dynamic routes
        run: |
          find src/app -type f -name "page.tsx" | while read file; do
            dir=$(dirname "$file")
            if echo "$dir" | grep -q '\['; then
              if ! grep -q "generateStaticParams" "$file"; then
                echo "Fixing: $file"
                sed -i '1s/^/export async function generateStaticParams() { return [] }\n\n/' "$file"
              fi
            fi
          done

      - name: Build Next.js App
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap add android
          npx cap sync

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
